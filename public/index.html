<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Livestorm Webinar Dashboard</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="dot"></span>
      <h1>Webinar Dashboard</h1>
    </div>
    <div class="topbar-right">
      <label class="range">
        <span>Window</span>
        <select id="range">
          <option value="12" selected>Last 12 weeks</option>
          <option value="26">Last 26 weeks</option>
          <option value="52">Last 52 weeks</option>
          <option value="0">All time</option>
          <option value="custom">Custom range…</option>
        </select>
      </label>
      <span id="custom-range" class="custom-range" hidden>
        <input type="date" id="from" aria-label="From date" />
        <span class="dash">–</span>
        <input type="date" id="to" aria-label="To date" />
        <button id="apply-range" class="apply-btn">Apply</button>
      </span>
      <span id="status" class="status"></span>
      <button id="theme-toggle" class="ghost-btn" title="Toggle light/dark" aria-label="Toggle theme">◐</button>
    </div>
  </header>

  <main class="layout">
    <aside class="picker card">
      <div class="card-head">
        <h2>Webinars</h2>
        <span class="card-sub" id="list-count"></span>
      </div>
      <input id="search" class="search" type="search" placeholder="Search webinars…" autocomplete="off" />
      <div id="selbar" class="selbar" hidden>
        <span id="selcount"></span>
        <button id="clearsel" class="linkbtn">Clear</button>
      </div>
      <ul id="webinar-list" class="webinar-list"></ul>
    </aside>

    <section class="detail">
      <div class="card">
        <div class="card-head">
          <h2>Registered vs. attended over time</h2>
          <span class="card-sub" id="trend-sub"></span>
        </div>
        <div id="trend-chart" class="chart"></div>
      </div>
      <div id="selection-panel"></div>
    </section>
  </main>

  <div id="tooltip" class="tooltip" hidden></div>
  <script src="/app.js"></script>
</body>
</html>
