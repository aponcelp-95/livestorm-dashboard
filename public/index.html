<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Livestorm Webinar Dashboard</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="dot"></span>
      <h1>Webinar Dashboard</h1>
    </div>
    <div class="topbar-right">
      <label class="range">
        <span>Window</span>
        <select id="range">
          <option value="12" selected>Last 12 weeks</option>
          <option value="26">Last 26 weeks</option>
          <option value="52">Last 52 weeks</option>
          <option value="0">All time</option>
        </select>
      </label>
      <span id="status" class="status"></span>
      <button id="theme-toggle" class="ghost-btn" title="Toggle light/dark" aria-label="Toggle theme">◐</button>
    </div>
  </header>

  <main class="layout">
    <aside class="picker card">
      <div class="card-head">
        <h2>Webinars</h2>
        <span class="card-sub" id="list-count"></span>
      </div>
      <input id="search" class="search" type="search" placeholder="Search webinars…" autocomplete="off" />
      <ul id="webinar-list" class="webinar-list"></ul>
    </aside>

    <section class="detail">
      <div id="detail-empty" class="card empty-card">
        <div class="empty">Select a webinar to see its registration, attendance, engagement, and conversion funnel.</div>
      </div>
      <div id="detail-content" hidden></div>
    </section>
  </main>

  <div id="tooltip" class="tooltip" hidden></div>
  <script src="/app.js"></script>
</body>
</html>
